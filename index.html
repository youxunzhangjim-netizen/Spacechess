<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Chess</title>
    <link rel="stylesheet" href="./css/launcher.css">
</head>
<body>
    <main class="launcher-shell">
        <section class="launcher-hero" aria-labelledby="launcherTitle">
            <div class="brand-block">
                <p class="eyebrow">Gameprojects</p>
                <h1 id="launcherTitle">Space Chess</h1>
            </div>

            <div class="mode-grid" aria-label="Choose chess space">
                <a class="mode-card mode-2d" href="./2dchess/">
                    <span class="mode-visual board-plane" aria-hidden="true">
                        <span></span><span></span><span></span><span></span>
                        <span></span><span></span><span></span><span></span>
                        <span></span><span></span><span></span><span></span>
                        <span></span><span></span><span></span><span></span>
                    </span>
                    <span class="mode-copy">
                        <strong>2D Space Chess</strong>
                        <small>Boundary chess board</small>
                    </span>
                </a>

                <a class="mode-card mode-3d" href="./toruschess/">
                    <span class="mode-visual image-plane" aria-hidden="true"></span>
                    <span class="mode-copy">
                        <strong>3D Space Chess</strong>
                        <small>R3, T2, RP2, Mobius</small>
                    </span>
                </a>
            </div>
        </section>
    </main>
</body>
</html>
